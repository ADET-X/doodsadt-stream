<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<meta name="monetag" content="bda09d9761257a42442daf7ce1819fd4">

<!-- 2. Script Iklan AdManager -->
<script async src="https://js.wpadmngr.com/static/adManager.js" data-admpid="448795"></script>

<!-- 3. Script Iklan Monetag (Zone 11376911) -->
<script>(function(s){s.dataset.zone='11376911',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

<!-- 4. Script Iklan Baru (Push Notifications / Banner Monetag) -->
<script src="https://5gvci.com/act/files/tag.min.js?z=11377004" data-cfasync="false" async></script>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    background:#000;
}
</style>
</head>

<body>

<video
    id="video"
    playsinline
    preload="metadata"
    controls>
</video>

<script>
const video = document.getElementById("video");

(function(){
    const params = new URLSearchParams(location.search);
    let id = params.get("id");

    if(!id) return;

    if(!id.toLowerCase().endsWith(".mp4")){
        id += ".mp4";
    }

    /* video source */
    video.src = "https://cdn.videy.co/" + id;
    video.load();
})();
</script>

</body>
</html>
