<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch</title>

<script async src="https://js.wpadmngr.com/static/adManager.js" data-admpid="441657"></script>
    
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    background:#000;
}
</style>
</head>

<body>

<video
    id="video"
    playsinline
    preload="metadata"
    controls>
</video>

<script>
const video = document.getElementById("video");

(function(){
    const params = new URLSearchParams(location.search);
    let id = params.get("id");

    if(!id) return;

    if(!id.toLowerCase().endsWith(".mp4")){
        id += ".mp4";
    }

    /* video source */
    video.src = "https://cdn.videy.co/" + id;
    video.load();
})();
</script>

</body>
</html>
