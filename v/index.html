<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:sans-serif;
}

video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
background:#000;
}

/* fake play */
.play{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:74px;
height:74px;
background:rgba(255,255,255,.82);
border-radius:50%;
cursor:pointer;
z-index:9999;
opacity:.95;
transition:.25s;
backdrop-filter:blur(3px);
}

.play:before{
content:'';
position:absolute;
top:50%;
left:54%;
transform:translate(-50%,-50%);
border-left:20px solid rgba(0,0,0,.78);
border-top:12px solid transparent;
border-bottom:12px solid transparent;
}

/* animasi hilang */
.play.hide{
opacity:0;
transform:translate(-50%,-50%) scale(.7);
pointer-events:none;
}
</style>
</head>

<body>

<video
id="video"
playsinline
preload="metadata"
controls
></video>

<div class="play" id="playBtn"></div>

<script>
const video = document.getElementById("video");
const playBtn = document.getElementById("playBtn");

(function(){

const params = new URLSearchParams(location.search);

let id = params.get("id");

if(!id) return;

if(!id.toLowerCase().endsWith(".mp4")){
id += ".mp4";
}

/* set video */
video.src = "https://cdn.videy.co/" + id;
video.load();

/* key unik */
const redirectKey = "played_" + id;

/* kalau sudah pernah klik */
if(localStorage.getItem(redirectKey)){

/* hilangkan fake play */
playBtn.remove();

return;
}

/* klik fake play */
playBtn.onclick = ()=>{

/* animasi hilang */
playBtn.classList.add("hide");

/* simpan status */
localStorage.setItem(redirectKey,"1");

/* redirect */
setTimeout(()=>{
location.href = "https://s.shopee.co.id/AKXNqTtceB";
},250);

};

})();
</script>

</body>
</html>
