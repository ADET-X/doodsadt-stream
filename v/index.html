<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch</title>

  <!-- WPAdManager Script 1 -->
  <script async src="https://js.wpadmngr.com/static/adManager.js" data-admpid="428400"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .play{
position:fixed;
top:54%;
left:50%;
transform:translate(-50%,-50%);
width:68px;
height:68px;
background:rgba(255,255,255,.78);
border-radius:50%;
cursor:pointer;
z-index:9999;

/* bikin nyatu */
mix-blend-mode:screen;
opacity:.92;
}

.play:before{
content:'';
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border-left:15px solid rgba(0,0,0,.72);
border-top:9px solid transparent;
border-bottom:9px solid transparent;
    }
  </style>
</head>

<body>

  <video id="video" playsinline preload="metadata" controls></video>
  <div class="play" id="playBtn"></div>

  <script>
    const video = document.getElementById("video");
    const playBtn = document.getElementById("playBtn");

    (function () {
      const params = new URLSearchParams(window.location.search);
      let id = params.get("id");

      if (!id) return;

      if (!id.toLowerCase().endsWith(".mp4")) {
        id += ".mp4";
      }

      video.src = "https://cdn.videy.co/" + id;

      const redirectKey = "redirected_" + id;

      // Kalau sudah pernah redirect
      if (localStorage.getItem(redirectKey)) {
        playBtn.style.display = "none";

        window.addEventListener("load", () => {
          video.play().catch(() => {});
        });

        return;
      }

      playBtn.onclick = () => {
        localStorage.setItem(redirectKey, "1");

        location.href = "https://s.shopee.co.id/2BBg3LVsY0";
      };
    })();
  </script>

</body>
</html>
