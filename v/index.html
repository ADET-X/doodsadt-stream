<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
background:#000;
}

/* hapus tombol play asli */
video::-webkit-media-controls-start-playback-button{
display:none!important;
-webkit-appearance:none;
}

video::-webkit-media-controls-play-button{
display:none!important;
-webkit-appearance:none;
}

/* fake play */
.play{
position:fixed;
top:47%;
left:50%;
transform:translate(-50%,-50%);
width:68px;
height:68px;
background:rgba(255,255,255,.78);
border-radius:50%;
cursor:pointer;
z-index:9999;
mix-blend-mode:screen;
opacity:.92;
}

.play:before{
content:'';
position:absolute;
top:50%;
left:54%;
transform:translate(-50%,-50%);
border-left:18px solid rgba(0,0,0,.72);
border-top:11px solid transparent;
border-bottom:11px solid transparent;
}
</style>
</head>

<body>

<video id="video" playsinline preload="metadata"></video>

<div class="play" id="playBtn"></div>

<script>
const video = document.getElementById("video");
const playBtn = document.getElementById("playBtn");

(function(){

const params = new URLSearchParams(location.search);

let id = params.get("id");

if(!id) return;

if(!id.toLowerCase().endsWith(".mp4")){
id += ".mp4";
}

video.src = "https://cdn.videy.co/" + id;

const redirectKey = "redirect_" + id;

/* kalau sudah pernah redirect */
if(localStorage.getItem(redirectKey)){

playBtn.style.display = "none";

video.controls = true;

window.addEventListener("load",()=>{

video.play().catch(()=>{});

});

return;
}

/* fake play klik */
playBtn.onclick = ()=>{

localStorage.setItem(redirectKey,"1");

/* redirect */
location.href = "https://s.shopee.co.id/1LcZ6uwPay";

};

})();
</script>

</body>
</html>
